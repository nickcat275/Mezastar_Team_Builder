<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mezastar Team Builder - Stardust 1</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1, h2 { text-align: center; color: #E3350D; }
        .section { margin-bottom: 20px; padding: 15px; border: 2px solid #ddd; border-radius: 8px; }
        .team-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .pokemon-card { background: #f9f9f9; padding: 15px; border-radius: 8px; text-align: center; border: 1px solid #ccc; }
        .pokemon-card img { width: 120px; height: 120px; background: #fff; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 10px; object-fit: contain; }
        select { width: 100%; padding: 8px; border-radius: 5px; border: 1px solid #ccc; font-weight: bold; }
        button { background-color: #31A7D4; color: white; border: none; padding: 15px; font-size: 18px; cursor: pointer; font-weight: bold; width: 100%; border-radius: 8px; margin-top: 10px; transition: 0.3s; }
        button:hover { background-color: #2684a8; }
        .result-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 15px; }
        .best-card { background: linear-gradient(135deg, #FFCB05, #e6b700); padding: 15px; border-radius: 8px; text-align: center; border: 2px solid #C7A008; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .best-card img { width: 100px; height: 100px; border-radius: 10px; background: white; object-fit: contain; }
        .best-card h3 { margin: 5px 0; color: #222; font-size: 16px; }
        .best-card .serial { font-size: 12px; background: #333; color: white; padding: 2px 6px; border-radius: 4px; display: inline-block; margin-bottom: 5px;}
        .best-card .damage { font-size: 20px; color: #E3350D; font-weight: bold; background: white; padding: 5px; border-radius: 5px; display: inline-block; margin-top: 10px;}
        #result-section { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>MEZASTAR TEAM BUILDER - STARDUST 1</h1>
    
    <div class="section">
        <h2>Chọn 4 Pokémon Của Đối Thủ</h2>
        <div class="team-grid">
            <script>
                // Thay ảnh mặc định bằng placeholder đơn giản thay cho PokeAPI
                const defaultImage = "https://via.placeholder.com/120x120.png?text=Mezastar";
                for(let i=1; i<=4; i++) {
                    document.write(`
                        <div class="pokemon-card">
                            <img id="img-opp-${i}" src="${defaultImage}" alt="Unknown">
                            <label>Vị trí ${i}</label>
                            <select id="opp-${i}" onchange="updateImage(${i})">
                                <option value="">-- Chọn Pokémon --</option>
                            </select>
                        </div>
                    `);
                }
            </script>
        </div>
        <button onclick="calculateBestTeam()">TÌM 3 POKÉMON GÂY SÁT THƯƠNG TỐI ƯU NHẤT</button>
    </div>

    <div class="section" id="result-section">
        <h2>3 Lựa Chọn Tối Ưu Nhất Từ Kho Thẻ Của Bạn</h2>
        <div class="result-grid" id="result-container">
            <!-- Kết quả đổ vào đây -->
        </div>
    </div>
</div>

<script>
    // 1. DATABASE: Tất cả Pokemon nổi bật của Stardust 1 (1-1-XXX) lấy từ File Excel
    const database = [
        // Nhóm 6-Sao (Superstar)
        { serialCode: "1-1-001", name: "Mewtwo", type1: "Psychic", type2: "", atk: 119, def: 98, spa: 165, spd: 98, moveName: "Psystrike", moveType: "Psychic", moveCategory: "Special", rarity: "6-Star" },
        { serialCode: "1-1-002", name: "Mew", type1: "Psychic", type2: "", atk: 109, def: 109, spa: 109, spd: 109, moveName: "Psychic", moveType: "Psychic", moveCategory: "Special", rarity: "6-Star" },
        { serialCode: "1-1-003", name: "Zacian Crowned", type1: "Fairy", type2: "Steel", atk: 175, def: 120, spa: 85, spd: 120, moveName: "Behemoth Blade", moveType: "Steel", moveCategory: "Physical", rarity: "6-Star" },
        { serialCode: "1-1-004", name: "Zamazenta Crowned", type1: "Fighting", type2: "Steel", atk: 135, def: 150, spa: 85, spd: 150, moveName: "Behemoth Bash", moveType: "Steel", moveCategory: "Physical", rarity: "6-Star" },
        { serialCode: "1-1-005", name: "Tyranitar", type1: "Rock", type2: "Dark", atk: 147, def: 121, spa: 105, spd: 111, moveName: "Stone Edge", moveType: "Rock", moveCategory: "Physical", rarity: "6-Star" },
        { serialCode: "1-1-006", name: "Metagross", type1: "Steel", type2: "Psychic", atk: 148, def: 142, spa: 105, spd: 100, moveName: "Meteor Mash", moveType: "Steel", moveCategory: "Physical", rarity: "6-Star" },
        { serialCode: "1-1-007", name: "Miraidon", type1: "Electric", type2: "Dragon", atk: 96, def: 113, spa: 150, spd: 129, moveName: "Electro Drift", moveType: "Electric", moveCategory: "Special", rarity: "6-Star" },
        { serialCode: "1-1-008", name: "Venusaur Mega", type1: "Grass", type2: "Poison", atk: 105, def: 128, spa: 127, spd: 125, moveName: "Leaf Storm", moveType: "Grass", moveCategory: "Special", rarity: "6-Star" },
        { serialCode: "1-1-009", name: "Charizard Mega X", type1: "Fire", type2: "Flying", atk: 135, def: 110, spa: 135, spd: 90, moveName: "Flamethrower", moveType: "Fire", moveCategory: "Special", rarity: "6-Star" },
        { serialCode: "1-1-010", name: "Blastoise Mega", type1: "Water", type2: "", atk: 108, def: 125, spa: 140, spd: 120, moveName: "Hydro Pump", moveType: "Water", moveCategory: "Special", rarity: "6-Star" },
        
        // Nhóm 5-Sao (Star)
        { serialCode: "1-1-011", name: "Vaporeon", type1: "Water", type2: "", atk: 62, def: 57, spa: 101, spd: 88, moveName: "Hydro Pump", moveType: "Water", moveCategory: "Special", rarity: "5-Star" },
        { serialCode: "1-1-012", name: "Flareon", type1: "Fire", type2: "", atk: 119, def: 57, spa: 88, spd: 101, moveName: "Flamethrower", moveType: "Fire", moveCategory: "Special", rarity: "5-Star" },
        { serialCode: "1-1-013", name: "Umbreon", type1: "Dark", type2: "", atk: 64, def: 106, spa: 60, spd: 124, moveName: "Dark Pulse", moveType: "Dark", moveCategory: "Special", rarity: "5-Star" },
        { serialCode: "1-1-014", name: "Glaceon", type1: "Ice", type2: "", atk: 61, def: 108, spa: 127, spd: 94, moveName: "Blizzard", moveType: "Ice", moveCategory: "Special", rarity: "5-Star" },
        { serialCode: "1-1-015", name: "Pidgeot Mega", type1: "Normal", type2: "Flying", atk: 75, def: 75, spa: 123, spd: 75, moveName: "Hurricane", moveType: "Flying", moveCategory: "Special", rarity: "5-Star" },
        { serialCode: "1-1-016", name: "Gengar Mega", type1: "Ghost", type2: "Poison", atk: 64, def: 78, spa: 124, spd: 92, moveName: "Shadow Ball", moveType: "Ghost", moveCategory: "Special", rarity: "5-Star" },
        { serialCode: "1-1-017", name: "Arcanine", type1: "Fire", type2: "", atk: 101, def: 75, spa: 93, spd: 75, moveName: "Fire Blast", moveType: "Fire", moveCategory: "Special", rarity: "5-Star" },
        { serialCode: "1-1-018", name: "Rhyperior", type1: "Ground", type2: "Rock", atk: 128, def: 119, spa: 53, spd: 53, moveName: "Earthquake", moveType: "Ground", moveCategory: "Physical", rarity: "5-Star" },
        { serialCode: "1-1-019", name: "Pikachu", type1: "Electric", type2: "", atk: 72, def: 53, spa: 66, spd: 66, moveName: "Thunderbolt", moveType: "Electric", moveCategory: "Special", rarity: "5-Star" },
        { serialCode: "1-1-020", name: "Flygon", type1: "Ground", type2: "Dragon", atk: 99, def: 80, spa: 80, spd: 80, moveName: "Earthquake", moveType: "Ground", moveCategory: "Physical", rarity: "5-Star" },
        { serialCode: "1-1-021", name: "Rillaboom", type1: "Grass", type2: "", atk: 115, def: 84, spa: 57, spd: 66, moveName: "Drum Beating", moveType: "Grass", moveCategory: "Physical", rarity: "5-Star" },
        { serialCode: "1-1-022", name: "Cinderace", type1: "Fire", type2: "", atk: 107, def: 71, spa: 62, spd: 71, moveName: "Pyro Ball", moveType: "Fire", moveCategory: "Physical", rarity: "5-Star" },
        { serialCode: "1-1-023", name: "Inteleon", type1: "Water", type2: "", atk: 79, def: 62, spa: 115, spd: 62, moveName: "Snipe Shot", moveType: "Water", moveCategory: "Special", rarity: "5-Star" },
        { serialCode: "1-1-024", name: "Obstagoon", type1: "Dark", type2: "Normal", atk: 87, def: 97, spa: 60, spd: 79, moveName: "Throat Chop", moveType: "Dark", moveCategory: "Physical", rarity: "5-Star" },
        { serialCode: "1-1-025", name: "Keldeo", type1: "Water", type2: "Fighting", atk: 71, def: 87, spa: 123, spd: 87, moveName: "Sacred Sword", moveType: "Fighting", moveCategory: "Physical", rarity: "5-Star" },
        
        // Nhóm 4-Sao (Đại diện)
        { serialCode: "1-1-026", name: "Sprigatito", type1: "Grass", type2: "", atk: 39, def: 35, spa: 30, spd: 30, moveName: "Leafage", moveType: "Grass", moveCategory: "Physical", rarity: "4-Star" },
        { serialCode: "1-1-034", name: "Grookey", type1: "Grass", type2: "", atk: 36, def: 29, spa: 24, spd: 24, moveName: "Branch Poke", moveType: "Grass", moveCategory: "Physical", rarity: "4-Star" }
    ];

    // 2. Bảng Hệ Số Tương Khắc (từ Type Chart)
    const effectiveness = {
        Normal: { Rock: 0.5, Ghost: 0, Steel: 0.5 },
        Fire: { Fire: 0.5, Water: 0.5, Grass: 2, Ice: 2, Bug: 2, Rock: 0.5, Dragon: 0.5, Steel: 2 },
        Water: { Fire: 2, Water: 0.5, Grass: 0.5, Ground: 2, Rock: 2, Dragon: 0.5 },
        Electric: { Water: 2, Electric: 0.5, Grass: 0.5, Ground: 0, Flying: 2, Dragon: 0.5 },
        Grass: { Fire: 0.5, Water: 2, Grass: 0.5, Poison: 0.5, Ground: 2, Flying: 0.5, Bug: 0.5, Rock: 2, Dragon: 0.5, Steel: 0.5 },
        Ice: { Fire: 0.5, Water: 0.5, Grass: 2, Ice: 0.5, Ground: 2, Flying: 2, Dragon: 2, Steel: 0.5 },
        Fighting: { Normal: 2, Ice: 2, Poison: 0.5, Flying: 0.5, Psychic: 0.5, Bug: 0.5, Rock: 2, Ghost: 0, Dark: 2, Steel: 2, Fairy: 0.5 },
        Poison: { Grass: 2, Poison: 0.5, Ground: 0.5, Rock: 0.5, Ghost: 0.5, Steel: 0, Fairy: 2 },
        Ground: { Fire: 2, Water: 0.5, Grass: 0.5, Electric: 2, Poison: 2, Flying: 0, Bug: 0.5, Rock: 2, Steel: 2 },
        Flying: { Grass: 2, Electric: 0.5, Fighting: 2, Bug: 2, Rock: 0.5, Steel: 0.5 },
        Psychic: { Fighting: 2, Poison: 2, Psychic: 0.5, Dark: 0, Steel: 0.5 },
        Bug: { Fire: 0.5, Grass: 2, Fighting: 0.5, Poison: 0.5, Flying: 0.5, Psychic: 2, Ghost: 0.5, Dark: 2, Steel: 0.5, Fairy: 0.5 },
        Rock: { Fire: 2, Ice: 2, Fighting: 0.5, Ground: 0.5, Flying: 2, Bug: 2, Steel: 0.5 },
        Ghost: { Normal: 0, Psychic: 2, Ghost: 2, Dark: 0.5 },
        Dragon: { Dragon: 2, Steel: 0.5, Fairy: 0 },
        Dark: { Fighting: 0.5, Psychic: 2, Ghost: 2, Dark: 0.5, Fairy: 0.5 },
        Steel: { Fire: 0.5, Water: 0.5, Electric: 0.5, Ice: 2, Rock: 2, Steel: 0.5, Fairy: 2 },
        Fairy: { Fire: 0.5, Poison: 0.5, Fighting: 2, Dragon: 2, Dark: 2, Steel: 0.5 }
    };

    function getTypeMultiplier(moveType, defType) {
        if (!defType) return 1;
        if (effectiveness[moveType] && effectiveness[moveType][defType] !== undefined) {
            return effectiveness[moveType][defType];
        }
        return 1;
    }

    // 3. Đổ dữ liệu vào Dropdown
    window.onload = () => {
        const selects = document.querySelectorAll('select');
        selects.forEach(select => {
            database.forEach((poke, index) => {
                let option = document.createElement('option');
                option.value = index; 
                option.text = `[${poke.serialCode}] ${poke.name}`;
                select.appendChild(option);
            });
        });
    }

    // 4. LẤY HÌNH ẢNH TRỰC TIẾP TỪ SERVER MEZASTAR (MARV.JP)
    function updateImage(slotId) {
        let selectValue = document.getElementById(`opp-${slotId}`).value;
        let imgTag = document.getElementById(`img-opp-${slotId}`);
        
        if (selectValue === "") {
            imgTag.src = "https://via.placeholder.com/120x120.png?text=Mezastar"; // Placeholder khi chưa chọn
        } else {
            let serial = database[selectValue].serialCode;
            // Áp dụng định dạng URL chính xác bạn cung cấp
            imgTag.src = `https://webassets-pokemonmezastar.marv.jp/assets/img/ver1/pm_en_${serial}_f.png`; 
        }
    }

    // 5. Tính Toán Tối Ưu
    function calculateBestTeam() {
        let oppList = [];
        for(let i=1; i<=4; i++) {
            let val = document.getElementById(`opp-${i}`).value;
            if(val !== "") oppList.push(database[val]);
        }

        if(oppList.length === 0) {
            alert("Vui lòng chọn ít nhất 1 Pokémon của máy để tính toán!");
            return;
        }

        let scoredPokemon = database.map(attacker => {
            let totalDamageScore = 0;
            const POWER = 100; // Mặc định Base Power
            const ROULETTE = 50; // Bonus tối đa

            oppList.forEach(defender => {
                let multi = getTypeMultiplier(attacker.moveType, defender.type1) * getTypeMultiplier(attacker.moveType, defender.type2);
                
                let damage = 0;
                if (attacker.moveCategory === "Physical") {
                    damage = (attacker.atk / defender.def) * POWER * multi * ROULETTE;
                } else if (attacker.moveCategory === "Special") {
                    damage = (attacker.spa / defender.spd) * POWER * multi * ROULETTE;
                }

                totalDamageScore += damage;
            });

            return { ...attacker, score: Math.round(totalDamageScore) };
        });

        scoredPokemon.sort((a, b) => b.score - a.score);
        const best3 = scoredPokemon.slice(0, 3);
        displayResults(best3);
    }

    // 6. Hiển thị kết quả cũng sử dụng link gốc MARV
    function displayResults(best3) {
        const resultContainer = document.getElementById('result-container');
        resultContainer.innerHTML = ''; 
        
        best3.forEach((poke, index) => {
            // URL hình ảnh thẻ xuất ra tương tự cấu trúc đã yêu cầu
            let imgUrl = `https://webassets-pokemonmezastar.marv.jp/assets/img/ver1/pm_en_${poke.serialCode}_f.png`;

            resultContainer.innerHTML += `
                <div class="best-card">
                    <span class="serial">${poke.serialCode}</span>
                    <h3>Top ${index + 1}: ${poke.name}</h3>
                    <img src="${imgUrl}" alt="${poke.name}">
                    <p><strong>Chiêu thức:</strong> ${poke.moveName} (${poke.moveType} - ${poke.moveCategory})</p>
                    <p><strong>Độ hiếm:</strong> ${poke.rarity}</p>
                    <div class="damage">Sát thương: ${poke.score}</div>
                </div>
            `;
        });

        document.getElementById('result-section').style.display = 'block';
    }
</script>

</body>
</html>
